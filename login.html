<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Say It Social — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0B1220;--navy2:#111827;--surface:#161E30;
  --blue:#1E6FFF;--blue-dim:rgba(30,111,255,0.08);
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#E8EDF8;--muted:#6B7A99;--white:#FFFFFF;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(30,111,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(30,111,255,0.04) 1px,transparent 1px);
  background-size:48px 48px;}
body::after{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:900px;height:500px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(30,111,255,0.1) 0%,transparent 70%);z-index:0;pointer-events:none;}

.login-wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:20px;}

.login-card{background:var(--navy2);border:1px solid var(--border2);border-radius:20px;padding:40px 36px;box-shadow:0 32px 80px rgba(0,0,0,0.5);}

.login-logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:32px;}
.login-mark{width:44px;height:44px;border-radius:12px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff;box-shadow:0 0 28px rgba(30,111,255,0.5);}
.login-brand-top{font-size:15px;font-weight:700;color:var(--white);}
.login-brand-sub{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}

.login-title{font-family:'Instrument Serif',serif;font-size:28px;color:var(--white);text-align:center;line-height:1.2;margin-bottom:8px;}
.login-title em{color:#7BB3FF;font-style:italic;}
.login-sub{font-size:13px;color:var(--muted);text-align:center;line-height:1.6;margin-bottom:32px;}

.google-btn{
  display:flex;align-items:center;justify-content:center;gap:12px;
  width:100%;padding:14px 20px;border-radius:12px;
  background:var(--white);border:none;cursor:pointer;
  font-size:14px;font-weight:600;color:#1f1f1f;
  font-family:'Plus Jakarta Sans',sans-serif;
  transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.google-btn:hover{box-shadow:0 4px 20px rgba(0,0,0,.3);transform:translateY(-1px);}
.google-btn:active{transform:translateY(0);}
.google-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.google-icon{width:20px;height:20px;flex-shrink:0;}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider-line{flex:1;height:1px;background:var(--border);}
.divider-txt{font-size:11px;color:var(--muted);}

.error-box{display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:12px 16px;font-size:12px;color:#FCA5A5;line-height:1.6;margin-top:16px;text-align:center;}
.error-box.show{display:block;}

.loading-box{display:none;text-align:center;padding:16px;font-size:12px;color:var(--muted);}
.loading-box.show{display:block;}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg)}}

.footer-note{text-align:center;margin-top:24px;font-size:11px;color:var(--muted);}
.footer-note a{color:var(--muted);text-decoration:none;}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">

    <div class="login-logo">
      <div class="login-mark">SIS</div>
      <div>
        <div class="login-brand-top">Say It Social</div>
        <div class="login-brand-sub">Client Hub</div>
      </div>
    </div>

    <div class="login-title">Welcome<br><em>back.</em></div>
    <div class="login-sub">Sign in with your Google account to access the Say It Social team dashboard.</div>

    <button class="google-btn" id="googleBtn" onclick="signInWithGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Sign in with Google
    </button>

    <div class="loading-box" id="loadingBox">
      <span class="spinner"></span>Signing you in...
    </div>

    <div class="error-box" id="errorBox"></div>

  </div>
  <div class="footer-note">Built by <a href="#">Apexis Technologies</a> &nbsp;·&nbsp; Say It Social &copy; <span id="yr"></span></div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, getDocsFromServer, doc, setDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey:"AIzaSyB54GIV9wfMaHqBs5Hy9Cy10Gu9kCqG33U",
    authDomain:"sayitsocial-calendar.firebaseapp.com",
    projectId:"sayitsocial-calendar",
    storageBucket:"sayitsocial-calendar.firebasestorage.app",
    messagingSenderId:"232081824561",
    appId:"1:232081824561:web:0131d5e91d96ce8ea9ae10"
  });

  const auth     = getAuth(app);
  const db       = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // ── TEAM ALLOWLIST — Firestore-backed (team_members collection) ──
  // Seed list used only to bootstrap Firestore once if the collection is empty.
  const SEED_TEAM = [
    {email:"darshilsoni10@gmail.com",     name:"Darshil"},
    {email:"aayushimulay0903@gmail.com",  name:"Aayushi"},
    {email:"bikashsahooclg09@gmail.com",  name:"Bikash"},
    {email:"niyatiparikh98@gmail.com",    name:"Niyati"},
    {email:"patelriddhi221@gmail.com",    name:"Riddhi"},
    {email:"kavyabothrasocial@gmail.com", name:"Kavya"},
    {email:"kritika70015@gmail.com",      name:"Kritika"},
  ];

  async function loadAllowedEmails(){
    try{
      const snap = await getDocsFromServer(collection(db, "team_members"));
      if(snap.empty){
        // First-ever load — bootstrap Firestore with the seed list so nobody is locked out.
        await Promise.all(SEED_TEAM.map(m =>
          setDoc(doc(db, "team_members", m.email.toLowerCase()), {
            email: m.email.toLowerCase(), name: m.name, addedBy: "system-seed", addedAt: new Date().toISOString()
          })
        ));
        return SEED_TEAM.map(m => m.email.toLowerCase());
      }
      const emails = [];
      snap.forEach(d => emails.push((d.data().email || d.id).toLowerCase()));
      return emails;
    } catch(e){
      console.error("Failed to load team allowlist, falling back to seed list:", e);
      return SEED_TEAM.map(m => m.email.toLowerCase());
    }
  }

  const allowedEmailsPromise = loadAllowedEmails();

  // If already signed in with allowed email → go straight to dashboard
  onAuthStateChanged(auth, async user => {
    if(!user) return;
    const ALLOWED = await allowedEmailsPromise;
    if(ALLOWED.includes(user.email.toLowerCase())) {
      window.location.href = "index.html";
    }
  });

  window.signInWithGoogle = async function() {
    const btn  = document.getElementById("googleBtn");
    const load = document.getElementById("loadingBox");
    const err  = document.getElementById("errorBox");

    btn.disabled = true;
    btn.style.display = "none";
    load.classList.add("show");
    err.classList.remove("show");

    try {
      const result = await signInWithPopup(auth, provider);
      const email  = result.user.email.toLowerCase();
      const ALLOWED = await allowedEmailsPromise;

      if(ALLOWED.includes(email)) {
        window.location.href = "index.html";
      } else {
        await auth.signOut();
        err.textContent = "Access denied. Your Google account (" + email + ") is not authorised to access this tool. Contact Darshil to get access.";
        err.classList.add("show");
        btn.disabled = false;
        btn.style.display = "flex";
        load.classList.remove("show");
      }
    } catch(e) {
      if(e.code !== "auth/popup-closed-by-user") {
        err.textContent = "Sign in failed. Please try again. (" + e.message + ")";
        err.classList.add("show");
      }
      btn.disabled = false;
      btn.style.display = "flex";
      load.classList.remove("show");
    }
  };
</script>

<script>
  document.getElementById("yr").textContent = new Date().getFullYear();
</script>
</body>
</html>
