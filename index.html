<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIS — Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Bricolage+Grotesque:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0D0F14;
  --sidebar:#0F121A;
  --surface:#13161E;
  --surface2:#1A1E28;
  --border:#252A38;
  --accent:#F5A623;
  --text:#E8EAF0;
  --muted:#6B7280;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Bricolage Grotesque',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  background:var(--sidebar);
  border-right:1px solid var(--border);
  padding:24px;
  position:fixed;
}

.logo{
  font-family:'Syne';
  font-size:20px;
  font-weight:700;
  margin-bottom:30px;
}

.nav-item{
  padding:10px 14px;
  border-radius:10px;
  margin-bottom:8px;
  color:var(--muted);
  cursor:pointer;
}

.nav-item.active{
  background:var(--accent);
  color:#000;
  font-weight:700;
}

/* MAIN */
.main{
  margin-left:240px;
  width:100%;
}

/* HEADER */
.header{
  padding:20px 30px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.header-title{
  font-weight:600;
}

.stats{
  display:flex;
  gap:20px;
  font-size:13px;
  color:var(--muted);
}

/* GRID */
.grid{
  padding:30px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:20px;
  transition:0.25s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

.card-top{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
}

.client{
  display:flex;
  gap:10px;
}

.avatar{
  width:40px;height:40px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.name{font-weight:600;}
.meta{font-size:12px;color:var(--muted);}

.status{
  font-size:12px;
  padding:4px 10px;
  border-radius:20px;
  background:rgba(46,196,169,0.2);
  color:#2EC4A9;
}

/* PROGRESS */
.progress-wrap{margin-bottom:15px;}

.progress-label{
  font-size:12px;
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}

.progress-bar{
  height:6px;
  background:var(--surface2);
  border-radius:10px;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  background:linear-gradient(135deg,#F5A623,#FF7A00);
}

/* STATS */
.card-stats{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin-bottom:15px;
}

/* PHASE LINKS */
.phase-links a{
  display:block;
  padding:8px 10px;
  border-radius:10px;
  font-size:12px;
  color:var(--muted);
  text-decoration:none;
}

.phase-links a:hover{
  background:var(--surface2);
  color:var(--accent);
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">Say It Social</div>
  <div class="nav-item active">Dashboard</div>
  <div class="nav-item">Clients</div>
  <div class="nav-item">Calendar</div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <div class="header-title">Dashboard</div>
    <div class="stats" id="stats"></div>
  </div>

  <div class="grid" id="grid"></div>

</div>

<script>
const clients = [
  {
    name:"BSFC Thaltej",
    location:"Ahmedabad",
    emoji:"🌟",
    phases:[
      {name:"Phase 2 — Build Trust",url:"bsfc-thaltej/phase2.html",status:"active",posts:12,stories:16},
      {name:"Phase 3 — School Live",url:"bsfc-thaltej/phase3.html",status:"planning",posts:12,stories:16}
    ]
  },
  {
    name:"Say It Social",
    location:"Ahmedabad",
    emoji:"📣",
    phases:[
      {name:"Apr-May Campaign",url:"say-it-social/apr-may-calendar.html",status:"active",posts:10,stories:5}
    ]
  }
];

function render(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  let totalClients=clients.length;
  let activeClients=0;

  clients.forEach(c=>{
    const activePhase=c.phases.find(p=>p.status==="active");
    if(activePhase) activeClients++;

    const progress=activePhase?70:100;

    grid.innerHTML+=`
    <div class="card">
      <div class="card-top">
        <div class="client">
          <div class="avatar">${c.emoji}</div>
          <div>
            <div class="name">${c.name}</div>
            <div class="meta">${c.location}</div>
          </div>
        </div>
        <div class="status">${activePhase?"Active":"Done"}</div>
      </div>

      <div class="progress-wrap">
        <div class="progress-label">
          ${activePhase?activePhase.name:"Completed"}
          <span>${progress}%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${progress}%"></div>
        </div>
      </div>

      <div class="card-stats">
        <div>${activePhase?activePhase.posts:0} Posts</div>
        <div>${activePhase?activePhase.stories:0} Stories</div>
      </div>

      <div class="phase-links">
        ${c.phases.map(p=>`<a href="${p.url}" target="_blank">→ ${p.name}</a>`).join("")}
      </div>
    </div>
    `;
  });

  document.getElementById("stats").innerHTML=`
    <div>${totalClients} Clients</div>
    <div>${activeClients} Active</div>
  `;
}

render();
</script>

</body>
</html>
